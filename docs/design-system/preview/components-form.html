<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body style="padding:22px;font-family:'Plus Jakarta Sans'">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px">
<label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500">Project name
<input value="niamoto-nc" style="font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid oklch(0.88 0.005 250);border-radius:6px;outline:none"/>
</label>
<label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500">Theme preset
<select style="font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid oklch(0.88 0.005 250);border-radius:6px;background:#fff">
<option>Frond — brand</option><option>Forest</option><option>Herbier</option>
</select>
</label>
</div>
<div style="display:flex;align-items:center;gap:10px;margin-top:16px;padding:12px 14px;background:oklch(0.94 0.005 250);border:1px solid oklch(0.88 0.005 250 / 0.5);border-radius:7px;max-width:560px;font-size:13px">
<span style="margin-right:auto">Auto-load last project on startup</span>
<span style="width:36px;height:20px;background:#2E7D32;border-radius:9999px;position:relative"><span style="position:absolute;width:16px;height:16px;background:#fff;border-radius:999px;top:2px;right:2px;box-shadow:0 1px 2px rgba(0,0,0,.2)"></span></span>
</div>
</body></html>
