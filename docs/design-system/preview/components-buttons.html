<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body style="padding:22px">
<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:14px;background:#2E7D32;color:#fff;border:0;padding:8px 14px;border-radius:7px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.05)">Create Project</button>
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:14px;background:linear-gradient(135deg,#2E7D32,#4BAF50);color:#fff;border:0;padding:8px 14px;border-radius:7px;cursor:pointer">Publish Site</button>
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:14px;background:#fff;color:oklch(0.16 0.005 270);border:1px solid oklch(0.88 0.005 250);padding:7px 14px;border-radius:7px;cursor:pointer">Open Project</button>
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:14px;background:transparent;color:oklch(0.5 0.01 250);border:0;padding:8px 12px;border-radius:7px;cursor:pointer">Cancel</button>
<button style="width:32px;height:32px;border-radius:6px;background:transparent;border:0;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.5 0.01 250);cursor:pointer"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6"/></svg></button>
</div>
<div style="display:flex;gap:10px;margin-top:14px">
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:12px;background:#fff;color:oklch(0.16 0.005 270);border:1px solid oklch(0.88 0.005 250);padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 3v6h6"/></svg>Recalculate</button>
<button style="font-family:'Plus Jakarta Sans';font-weight:500;font-size:12px;background:#E85D5D;color:#fff;border:0;padding:6px 10px;border-radius:6px">Delete</button>
</div>
</body></html>
