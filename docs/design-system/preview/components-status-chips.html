<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"></head>
<body style="padding:22px">
<div style="display:flex;gap:10px;flex-wrap:wrap;font-family:'Plus Jakarta Sans';font-size:12px">
<span style="display:inline-flex;align-items:center;gap:6px;background:#dcfce7;color:#166534;padding:2px 10px;border-radius:9999px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#22c55e"></span>fresh</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:#fef3c7;color:#92400e;padding:2px 10px;border-radius:9999px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#f59e0b"></span>stale</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:#dbeafe;color:#1e40af;padding:2px 10px;border-radius:9999px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#3b82f6"></span>running</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:oklch(0.94 0.005 250);color:oklch(0.5 0.01 250);padding:2px 10px;border-radius:9999px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:oklch(0.7 0.01 250)"></span>never_run</span>
<span style="display:inline-flex;align-items:center;gap:6px;background:#fee2e2;color:#991b1b;padding:2px 10px;border-radius:9999px;font-weight:500"><span style="width:6px;height:6px;border-radius:999px;background:#ef4444"></span>error</span>
</div>
<div class="val" style="margin-top:12px">px-2.5 py-0.5 · rounded-full · text-xs · font-medium</div>
</body></html>
